# Server Configuration
server.port=8082
server.servlet.context-path=/epm
server.error.include-stacktrace=ALWAYS

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=COOKIE

# Security Session Settings
spring.security.session.timeout=30m
spring.security.session.tracking-mode=cookie

# Prevent session fixation
server.servlet.session.cookie.max-age=30m
server.servlet.session.persistent=false

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/projectmanagement?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=ProjectManagementHikariPool

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=true

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=INFO
logging.level.com.enterprise.projectmanagement=DEBUG
logging.level.org.springframework.boot.web.servlet.filter=DEBUG

# Logging Pattern and File
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.max-size=10MB
logging.file.max-history=10

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# CORS and Security
spring.mvc.cors.enabled=true
spring.security.filter.order=10
spring.security.filter.dispatcher-types=async,error,request

# Error Handling
server.error.include-message=always
server.error.whitelabel.enabled=false
server.error.include-binding-errors=always

# Session and Authentication
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
spring.security.session.fixation.protection-strategy=migrateSession

# Web MVC Configuration
spring.mvc.dispatch-options-request=true
spring.mvc.formcontent.filter.enabled=true
spring.mvc.view.prefix=
spring.mvc.view.suffix=
spring.mvc.log-resolved-exception=true

# Main Application Configuration
spring.main.allow-bean-definition-overriding=true
spring.main.banner-mode=off
spring.main.lazy-initialization=false

# Performance Optimizations
spring.aop.auto=true
spring.jmx.enabled=false

# Custom Application Properties
app.upload.dir=./uploads
app.timezone=UTC
app.date-format=yyyy-MM-dd
app.datetime-format=yyyy-MM-dd HH:mm:ss

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rugvedkharde2211@gmail.com
spring.mail.password=Google@2211#
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Additional Debugging
debug=true