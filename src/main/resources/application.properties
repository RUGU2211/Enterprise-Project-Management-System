# Server Configuration
server.port=8082
server.servlet.context-path=/epm
server.error.include-stacktrace=never
server.servlet.session.timeout=30m

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/projectmanagement?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# Connection settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.tomcat.test-on-borrow=true
spring.datasource.tomcat.validation-query=SELECT 1

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Thymeleaf Configuration
spring.thymeleaf.check-template-location=false
spring.thymeleaf.enabled=false

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=true

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rugvedkharde2211@gmail.com
spring.mail.password=Google@2211#
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=INFO
logging.level.com.enterprise.projectmanagement=DEBUG
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# Custom Application Properties
app.upload.dir=./uploads
app.timezone=UTC
app.date-format=yyyy-MM-dd
app.datetime-format=yyyy-MM-dd HH:mm:ss

# Session Configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
# Set to true in production environments with HTTPS

# Added for Bootstrap UI to work with context path
spring.mvc.view.prefix=
spring.mvc.view.suffix=

# Prevent redirect loops
spring.mvc.dispatch-options-request=true
spring.mvc.formcontent.filter.enabled=true