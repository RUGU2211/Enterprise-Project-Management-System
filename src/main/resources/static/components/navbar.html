<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="#" id="projectOverview">Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="projectTeam">Team</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="projectIssues">Issues</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="projectTimeline">Timeline</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="projectDocuments">Documents</a>
                </li>
            </ul>
            <div class="d-flex">
                <div class="btn-group">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="editProjectBtn">
                        <i class="fas fa-edit me-1"></i> Edit
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-sm" id="deleteProjectBtn">
                        <i class="fas fa-trash me-1"></i> Delete
                    </button>

</nav>

<script>
    // Add event listeners for the navbar buttons
    document.addEventListener('DOMContentLoaded', function() {
        // Get the project ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        // Edit button
        const editBtn = document.getElementById('editProjectBtn');
        if (editBtn) {
            editBtn.addEventListener('click', function() {
                window.location.href = `/views/project/edit.html?id=${projectId}`;
            });
        }

        // Delete button
        const deleteBtn = document.getElementById('deleteProjectBtn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to delete this project? This action cannot be undone.')) {
                    // In a real app, this would call an API
                    alert('Project deleted successfully');
                    window.location.href = '/views/project/list.html';
                }
            });
        }

        // Set active tab based on hash
        const hash = window.location.hash || '#overview';
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === hash) {
                link.classList.add('active');
            }
        });
    });
</script>
