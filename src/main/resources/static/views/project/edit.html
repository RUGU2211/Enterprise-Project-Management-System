<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - Project Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="/epm/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="alertPlaceholder" class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1050;"></div>

<!-- Include Header -->
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Edit Project</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="list.html" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Projects
                    </a>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Project Information</h6>
                </div>
                <div class="card-body">
                    <form id="projectForm">
                        <div class="mb-3">
                            <label for="projectName" class="form-label">Project Name *</label>
                            <input type="text" class="form-control" id="projectName" required>
                        </div>
                        <div class="mb-3">
                            <label for="projectKey" class="form-label">Project Key *</label>
                            <input type="text" class="form-control" id="projectKey" required
                                   pattern="[A-Z0-9]{2,10}" title="2-10 uppercase letters or numbers">
                            <div class="form-text">A short identifier for the project (e.g. PRJ, DEMO). 2-10 uppercase letters or numbers.</div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="projectLead" class="form-label">Project Lead *</label>
                                <select class="form-select" id="projectLead" required>
                                    <option value="">Select Lead</option>
                                    <!-- Users will be loaded dynamically -->
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="projectType" class="form-label">Project Type *</label>
                                <select class="form-select" id="projectType" required>
                                    <option value="">Select Type</option>
                                    <option value="SCRUM">Scrum</option>
                                    <option value="KANBAN">Kanban</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="projectDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="projectDescription" rows="5"></textarea>
                        </div>

                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0">Team Members</h6>
                                <button type="button" class="btn btn-sm btn-primary" id="addTeamMemberBtn">
                                    <i class="fas fa-plus me-1"></i> Add Team Member
                                </button>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Role</th>
                                            <th>Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody id="teamMemberTableBody">
                                        <!-- Team members will be loaded dynamically -->
                                        <tr>
                                            <td colspan="3" class="text-center">Loading team members...</td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="button" id="cancelBtn" class="btn btn-outline-secondary me-2">
                                <i class="fas fa-times me-1"></i> Cancel
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Include Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/epm/assets/js/app.js"></script>
<script src="/epm/assets/js/project.js"></script>
</body>
</html>
