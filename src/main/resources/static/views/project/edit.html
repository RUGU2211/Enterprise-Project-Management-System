<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - Project Management System</title>

    <!-- Bootstrap CSS -->
    <link href="../../assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
<!-- Include Header -->
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Edit Project</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="list.html" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Projects
                    </a>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Project Information</h6>
                </div>
                <div class="card-body">
                    <form id="projectForm">
                        <div class="mb-3">
                            <label for="projectName" class="form-label">Project Name *</label>
                            <input type="text" class="form-control" id="projectName" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="projectManager" class="form-label">Project Manager *</label>
                                <select class="form-select" id="projectManager" required>
                                    <option value="">Select Manager</option>
                                    <option value="John Doe">John Doe</option>
                                    <option value="Jane Smith">Jane Smith</option>
                                    <option value="Mike Johnson">Mike Johnson</option>
                                    <option value="Sarah Williams">Sarah Williams</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="projectStatus" class="form-label">Status *</label>
                                <select class="form-select" id="projectStatus" required>
                                    <option value="Active">Active</option>
                                    <option value="On Hold">On Hold</option>
                                    <option value="Completed">Completed</option>
                                    <option value="Cancelled">Cancelled</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="projectStartDate" class="form-label">Start Date *</label>
                                <input type="date" class="form-control" id="projectStartDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="projectDeadline" class="form-label">Deadline *</label>
                                <input type="date" class="form-control" id="projectDeadline" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="projectProgress" class="form-label">Progress</label>
                            <div class="row g-0 align-items-center">
                                <div class="col-md-10">
                                    <div class="progress">
                                        <div class="progress-bar bg-success" role="progressbar" style="width: 65%"
                                             aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">65%</div>
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <input type="number" class="form-control ms-3" id="projectProgress" min="0" max="100" value="65">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="projectBudget" class="form-label">Budget (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="projectBudget" min="0" step="1000">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="projectDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="projectDescription" rows="5"></textarea>
                        </div>
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0">Team Members</h6>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Role</th>
                                            <th>Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody id="teamMemberTableBody">
                                        <tr>
                                            <td>Jane Smith</td>
                                            <td>Developer</td>
                                            <td>
                                                <button type="button" class="btn btn-sm btn-danger">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>Bob Johnson</td>
                                            <td>Designer</td>
                                            <td>
                                                <button type="button" class="btn btn-sm btn-danger">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>Alice Williams</td>
                                            <td>Tester</td>
                                            <td>
                                                <button type="button" class="btn btn-sm btn-danger">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <button type="button" class="btn btn-sm btn-primary" id="addTeamMemberBtn">
                                    <i class="fas fa-plus me-1"></i> Add Team Member
                                </button>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="button" id="cancelBtn" class="btn btn-outline-secondary me-2">
                                <i class="fas fa-times me-1"></i> Cancel
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Team Member Modal -->
<div class="modal fade" id="teamMemberModal" tabindex="-1" aria-labelledby="teamMemberModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="teamMemberModalLabel">Add Team Member</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="teamMemberForm">
                    <div class="mb-3">
                        <label for="teamMemberName" class="form-label">Name</label>
                        <select class="form-select" id="teamMemberName" required>
                            <option value="">Select Team Member</option>
                            <option value="John Doe">John Doe</option>
                            <option value="Mike Johnson">Mike Johnson</option>
                            <option value="Sarah Williams">Sarah Williams</option>
                            <option value="Tom Davis">Tom Davis</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="teamMemberRole" class="form-label">Role</label>
                        <select class="form-select" id="teamMemberRole" required>
                            <option value="">Select Role</option>
                            <option value="Developer">Developer</option>
                            <option value="Designer">Designer</option>
                            <option value="Tester">Tester</option>
                            <option value="Project Coordinator">Project Coordinator</option>
                            <option value="Business Analyst">Business Analyst</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveTeamMemberBtn">Add Member</button>
            </div>
        </div>
    </div>
</div>

<!-- Include Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="../../assets/js/bootstrap.bundle.min.js"></script>

<!-- jQuery (needed for loading components) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Custom JS -->
<script src="../../assets/js/script.js"></script>
<script src="../../js/project.js"></script>

<!-- Load components -->
<script>
    $(function(){
        $("#header-placeholder").load("../../components/header.html");
        $("#sidebar-placeholder").load("../../components/sidebar.html");
        $("#footer-placeholder").load("../../components/footer.html");

        // Initialize the teamMemberModal
        const teamMemberModal = new bootstrap.Modal(document.getElementById('teamMemberModal'));

        // Add team member button click event
        document.getElementById('addTeamMemberBtn').addEventListener('click', function() {
            teamMemberModal.show();
        });

        // Save team member button click event
        document.getElementById('saveTeamMemberBtn').addEventListener('click', function() {
            const name = document.getElementById('teamMemberName').value;
            const role = document.getElementById('teamMemberRole').value;

            if (!name || !role) {
                alert('Please fill in all fields.');
                return;
            }

            // Add new row to the table
            const tableBody = document.getElementById('teamMemberTableBody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                    <td>${name}</td>
                    <td>${role}</td>
                    <td>
                        <button type="button" class="btn btn-sm btn-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;

            tableBody.appendChild(newRow);

            // Add delete event listener to the new button
            newRow.querySelector('.btn-danger').addEventListener('click', function() {
                newRow.remove();
            });

            // Reset form and close modal
            document.getElementById('teamMemberForm').reset();
            teamMemberModal.hide();
        });

        // Add delete event listeners to existing buttons
        document.querySelectorAll('#teamMemberTableBody .btn-danger').forEach(button => {
            button.addEventListener('click', function() {
                this.closest('tr').remove();
            });
        });
    });
</script>
</body>
</html>
