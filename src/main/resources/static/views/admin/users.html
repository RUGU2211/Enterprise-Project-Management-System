<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="/epm/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/epm/assets/css/custom.css" rel="stylesheet">
</head>
<body>
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <div id="sidebar-placeholder" class="col-md-2"></div>

        <main class="col-md-10 ms-sm-auto px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">User Management</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <button type="button" class="btn btn-sm btn-outline-primary" id="addUserBtn">
                        <i class="fas fa-plus"></i> Add User
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-sm" id="usersTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    <!-- Users will be dynamically populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="/epm/assets/js/bootstrap.bundle.min.js"></script>
<script src="/epm/js/users.js"></script>
</body>
</html>
