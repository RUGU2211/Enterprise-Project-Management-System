<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Sprint - Project Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="/epm/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="alertPlaceholder" class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1050;"></div>

<!-- Include Header -->
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Create Sprint</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="list.html" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Sprints
                    </a>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Sprint Information</h6>
                </div>
                <div class="card-body">
                    <form id="sprintForm">
                        <div class="mb-3">
                            <label for="sprintName" class="form-label">Sprint Name *</label>
                            <input type="text" class="form-control" id="sprintName" required>
                        </div>
                        <div class="mb-3">
                            <label for="sprintProject" class="form-label">Project *</label>
                            <select class="form-select" id="sprintProject" required>
                                <option value="">Select Project</option>
                                <!-- Projects will be loaded dynamically -->
                            </select>
                            <div class="form-text">Note: Only Scrum projects can have sprints.</div>
                        </div>
                        <div class="mb-3">
                            <label for="sprintGoal" class="form-label">Sprint Goal</label>
                            <textarea class="form-control" id="sprintGoal" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="sprintStartDate" class="form-label">Start Date *</label>
                                <input type="date" class="form-control" id="sprintStartDate" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="sprintEndDate" class="form-label">End Date *</label>
                                <input type="date" class="form-control" id="sprintEndDate" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="sprintStatus" class="form-label">Status *</label>
                                <select class="form-select" id="sprintStatus" required disabled>
                                    <option value="PLANNING" selected>Planning</option>
                                    <option value="ACTIVE">Active</option>
                                    <option value="COMPLETED">Completed</option>
                                </select>
                                <div class="form-text">New sprints are always created in Planning status.</div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="button" id="cancelBtn" class="btn btn-outline-secondary me-2">
                                <i class="fas fa-times me-1"></i> Cancel
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Create Sprint
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Include Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="/epm/assets/js/app.js"></script>
<script src="/epm/assets/js/sprint.js"></script>
</body>
</html>
