<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Details - Project Management System</title>

    <!-- Bootstrap CSS -->
    <link href="../../assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
<!-- Include Header -->
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <!-- Issue Header -->
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" id="issueTitle">Issue Title</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <div class="btn-group me-2">
                        <a href="edit.html" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit me-1"></i> Edit
                        </a>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="deleteIssueBtn">
                            <i class="fas fa-trash me-1"></i> Delete
                        </button>
                    </div>
                    <a href="list.html" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Issues
                    </a>
                </div>
            </div>

            <!-- Issue Details Card -->
            <div class="row">
                <div class="col-md-8">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Issue Details</h6>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <h5>Description</h5>
                                <p id="issueDescription">Issue description will be displayed here...</p>
                            </div>

                            <h5>Comments</h5>
                            <div class="card mb-3">
                                <div class="card-body">
                                    <form id="commentForm">
                                        <div class="mb-3">
                                            <textarea class="form-control" id="commentText" rows="3" placeholder="Add a comment..."></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-paper-plane me-1"></i> Add Comment
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div id="commentsContainer">
                                <!-- Comments will be loaded dynamically -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Issue Information</h6>
                        </div>
                        <div class="card-body">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Project:</span>
                                    <a href="#" id="issueProject">Website Redesign</a>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Status:</span>
                                    <span id="issueStatus" class="badge bg-info">In Progress</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Priority:</span>
                                    <span id="issuePriority" class="badge bg-warning">Medium</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Assigned To:</span>
                                    <span id="issueAssignedTo">Jane Smith</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Created:</span>
                                    <span id="issueCreatedDate">03/10/2023</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Created By:</span>
                                    <span id="issueCreatedBy">John Doe</span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary">Actions</h6>
                        </div>
                        <div class="card-body">
                            <div class="d-grid gap-2">
                                <button class="btn btn-success changeStatus" data-status="Resolved">
                                    <i class="fas fa-check me-1"></i> Mark as Resolved
                                </button>
                                <button class="btn btn-info changeStatus" data-status="In Progress">
                                    <i class="fas fa-play me-1"></i> Mark as In Progress
                                </button>
                                <button class="btn btn-warning changeStatus" data-status="Open">
                                    <i class="fas fa-redo me-1"></i> Reopen Issue
                                </button>
                                <button class="btn btn-secondary">
                                    <i class="fas fa-user me-1"></i> Reassign
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Include Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="../../assets/js/bootstrap.bundle.min.js"></script>

<!-- jQuery (needed for loading components) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Custom JS -->
<script src="../../assets/js/script.js"></script>
<script src="../../js/issues.js"></script>

<!-- Load components -->
<script>
    $(function(){
        $("#header-placeholder").load("../../components/header.html");
        $("#sidebar-placeholder").load("../../components/sidebar.html");
        $("#footer-placeholder").load("../../components/footer.html");
    });
</script>
</body>
</html>
