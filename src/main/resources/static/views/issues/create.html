<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Issue - Project Management System</title>

    <!-- Bootstrap CSS -->
    <link href="../../assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
<!-- Include Header -->
<div id="header-placeholder"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Create Issue</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="list.html" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Issues
                    </a>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Issue Information</h6>
                </div>
                <div class="card-body">
                    <form id="issueForm">
                        <div class="mb-3">
                            <label for="issueTitle" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="issueTitle" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="issueProject" class="form-label">Project *</label>
                                <select class="form-select" id="issueProject" required>
                                    <option value="">Select Project</option>
                                    <!-- Projects will be loaded dynamically -->
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="issueAssignedTo" class="form-label">Assign To</label>
                                <select class="form-select" id="issueAssignedTo">
                                    <option value="">Select Team Member</option>
                                    <option value="John Doe">John Doe</option>
                                    <option value="Jane Smith">Jane Smith</option>
                                    <option value="Bob Johnson">Bob Johnson</option>
                                    <option value="Alice Williams">Alice Williams</option>
                                    <option value="Mike Johnson">Mike Johnson</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="issueStatus" class="form-label">Status *</label>
                                <select class="form-select" id="issueStatus" required>
                                    <option value="Open">Open</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Resolved">Resolved</option>
                                    <option value="Closed">Closed</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="issuePriority" class="form-label">Priority *</label>
                                <select class="form-select" id="issuePriority" required>
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="issueDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="issueDescription" rows="5"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="issueAttachments" class="form-label">Attachments</label>
                            <input class="form-control" type="file" id="issueAttachments" multiple>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="button" id="cancelBtn" class="btn btn-outline-secondary me-2">
                                <i class="fas fa-times me-1"></i> Cancel
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Save Issue
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Include Footer -->
<div id="footer-placeholder"></div>

<!-- Bootstrap Bundle with Popper -->
<script src="../../assets/js/bootstrap.bundle.min.js"></script>

<!-- jQuery (needed for loading components) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Custom JS -->
<script src="../../assets/js/script.js"></script>
<script src="../../js/issues.js"></script>

<!-- Load components -->
<script>
    $(function(){
        $("#header-placeholder").load("../../components/header.html");
        $("#sidebar-placeholder").load("../../components/sidebar.html");
        $("#footer-placeholder").load("../../components/footer.html");
    });
</script>
</body>
</html>
